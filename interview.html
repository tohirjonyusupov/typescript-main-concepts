<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview</title>
  <style>

    body {
      display: flex;
      justify-content: center;
      height: 100%;
      align-items: center;
    }

    .box {
      width: 200px;
      height: 200px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 1px 1px 8px 1px black;
      text-align: center;
    }

    .btn {
      background-color: green;
      padding: 10px 15px;
      width: 100%;
      border: none;
    }

    .btn:hover {
      background-color: black;
      color: white;
    }
  </style>
</head>
<body>

    <div class="box">
      <h2>John Doe</h2>
      <p>Frontend Developer</p>
      <button class="btn">Follow</button>
    </div>

</body>
</html>
